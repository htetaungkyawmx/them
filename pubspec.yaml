name: them
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # State Management
  get: ^4.6.6
  get_storage: ^2.1.1

  # Network & API
  dio: ^5.4.0
  socket_io_client: ^2.0.3+1

  # Authentication
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.1.5

  # Image & Storage
  image_picker: ^1.0.5
  firebase_storage: ^11.6.0

  # Location
  geolocator: ^10.1.0

  # Utils
  intl: ^0.18.1
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/