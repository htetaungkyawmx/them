name: them_dating_app
description: Them Dating App - Simple & Beautiful Dating App
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.2
  image_picker: ^1.1.2

  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  pinput: ^6.0.2

  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4

  google_sign_in: ^6.3.0
  google_sign_in_android: ^6.1.31
  google_sign_in_ios: ^5.7.7
  google_sign_in_web: ^0.12.4

  geolocator: ^10.1.0
  geocoding: ^2.1.1

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  cached_network_image: ^3.4.1

  web_socket_channel: ^2.4.0
  permission_handler: ^11.3.0

  intl: ^0.20.2
  uuid: ^4.5.1
  email_validator: ^3.0.0
  connectivity_plus: ^5.0.2
  shimmer: ^3.0.0
  sign_in_with_apple: ^6.1.4
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#FF6B6B"
  adaptive_icon_foreground: "assets/logo/logo.png"