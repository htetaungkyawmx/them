name: them_dating_app
description: Them Dating App - Premium Dating Experience
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.4
  firebase_messaging: ^15.2.4

  google_sign_in: ^6.3.0

  agora_rtc_engine: ^6.3.0
  permission_handler: ^11.3.1
  flutter_webrtc: ^0.12.1

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  font_awesome_flutter: ^10.8.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  animations: ^2.0.11
  lottie: ^3.3.1

  provider: ^6.1.2

  image_picker: ^1.1.2
  image_cropper: ^8.1.0

  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  geolocator: ^13.0.3
  geocoding: ^3.0.0

  web_socket_channel: ^3.0.2

  emoji_picker_flutter: ^4.4.0

  intl: ^0.20.2
  uuid: ^4.5.1
  email_validator: ^3.0.0
  connectivity_plus: ^6.1.3
  url_launcher: ^6.3.1
  path_provider: ^2.1.5

dependency_overrides:
  web: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/logo/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo/logo.png"
  min_sdk_android: 23
  remove_alpha_ios: true
  adaptive_icon_background: "#FF6B6B"
  adaptive_icon_foreground: "assets/logo/logo.png"